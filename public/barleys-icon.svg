<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <!-- Barley's Taproom & Pizzeria — icon mark, refresh round 1 (v2) -->
  <!-- Palette: red #CB262C, gold #FBBF13 (charcoal #35363A reserved for mono/lockups) -->
  <defs>
    <path id="grain" d="M 0 0 C -8 -6 -10 -18 -6 -27 C -3 -32 3 -32 6 -27 C 10 -18 8 -6 0 0 Z"/>
  </defs>

  <!-- badge: disc + single keyline -->
  <circle cx="256" cy="256" r="248" fill="#CB262C"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#FBBF13" stroke-width="16"/>

  <!-- crossed stems -->
  <g stroke="#FBBF13" stroke-width="11" stroke-linecap="round" fill="none">
    <path d="M 288 368 Q 226 314 204 250"/>
    <path d="M 224 368 Q 288 310 312 242"/>
  </g>

  <!-- barley head (left), tilted -15deg -->
  <g transform="translate(204 252) rotate(-15)" fill="#FBBF13">
    <line x1="0" y1="8" x2="0" y2="-86" stroke="#FBBF13" stroke-width="7" stroke-linecap="round"/>
    <use xlink:href="#grain" href="#grain" transform="translate(-5 2) rotate(-38)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(5 2) rotate(38)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(-5 -28) rotate(-34)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(5 -28) rotate(34)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(-5 -56) rotate(-30)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(5 -56) rotate(30)"/>
    <use xlink:href="#grain" href="#grain" transform="translate(0 -82)"/>
    <g stroke="#FBBF13" stroke-width="6" stroke-linecap="round">
      <line x1="-6" y1="-96" x2="-25" y2="-156"/>
      <line x1="0" y1="-100" x2="0" y2="-164"/>
      <line x1="6" y1="-96" x2="25" y2="-156"/>
    </g>
  </g>

  <!-- hop cone (right), tilted +20deg: solid silhouette with field-color cuts -->
  <g transform="translate(312 240) rotate(20) scale(1.15)">
    <path fill="#FBBF13" d="M 0 -98 C 20 -88 38 -62 38 -32 C 38 -4 22 10 0 10 C -22 10 -38 -4 -38 -32 C -38 -62 -20 -88 0 -98 Z"/>
    <g stroke="#CB262C" stroke-width="7" stroke-linecap="round" fill="none">
      <line x1="0" y1="-92" x2="0" y2="6"/>
      <path d="M -32 -18 Q 0 -36 32 -18"/>
      <path d="M -26 -48 Q 0 -64 26 -48"/>
      <path d="M -16 -74 Q 0 -86 16 -74"/>
    </g>
  </g>
</svg>
